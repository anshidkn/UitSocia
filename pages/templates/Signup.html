<!doctype html>
{%load static%}
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{%static 'fonts/icomoon/style.css' %}">

    <link rel="stylesheet" href="{%static 'css/owl.carousel.min.css' %}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{%static 'css/bootstrap.min.css' %}">
    
    <!-- Style -->
    <link rel="stylesheet" href="{%static 'css/style.css' %}">

    <title>SignUp</title>
  </head>
  <body>
  <div class="content">
    {%if messages%}
          <div class="row">
            <div class="col-1"></div>
            <div class="col-10">
              {%for msg in messages%}
              <div class="alert alert-info" role="alert">
                {{msg}}
              </div>
              {%endfor%}
            </div>
            <div class="col-1"></div>
          </div>
        {%endif%}
        <div class="row">
          <div class="col-1"></div>
          <div class="col-10">
            {{form.errors}}
          </div>
          <div class="col-1"></div>
        </div>
    <div class="container">
      <div class="row justify-content-center">
        <!-- <div class="col-md-6 order-md-2">
          <img src="images/undraw_file_sync_ot38.svg" alt="Image" class="img-fluid">
        </div> -->
        <div class="col-md-6 contents">
          <div class="row justify-content-center">
              <div class="form-block">
                  <div class="mb-4">
                    <div class="col-md-12">
                  <h3>Sign Up.<strong>It's Free</strong></h3>
                  <p class="mb-4">We would love to be in touch with you! Please sign up to receive emails from us!</p>
                </div>
                <form action="#" method="post">
                  {%csrf_token%}
                  <div class="form-group last mb-4">
                    <label for="email">First_Name</label>
                    <input type="first_name" class="form-control" id="first_name" name="first_name">
                    
                  </div>
                  <div class="form-group last mb-4">
                    <label for="last_name">Last_Name</label>
                    <input type="last_name" class="form-control" id="last_name" name="last_name">
                    
                  </div>
                  <div class="form-group last mb-4">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email">
                    
                  </div>
                  <div class="form-group last mb-4">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username">
                    
                  </div>
                  <div class="form-group last mb-4">
                    <label for="password1">Password</label>
                    <input type="password" class="form-control" id="password1" name="password1">
                    
                  </div>
                  <div class="form-group last mb-4">
                    <label for="password2">Confirm Password</label>
                    <input type="password" class="form-control" id="password2" name="password2">
                    
                  </div>
                  
                  <div class="d-flex mb-5 align-items-center">
                    <label class="control control--checkbox mb-0"><span class="caption">Remember me</span>
                      <input type="checkbox" checked="checked"/>
                      <div class="control__indicator"></div>
                    </label>
                    <span class="ml-auto"><a href="#" class="forgot-pass">Forgot Password</a></span> 
                  </div>

                  <input type="submit" value="SignUp" class="btn btn-pill text-white btn-block btn-primary">

                  <span class="d-block text-center my-4 text-muted"> or sign in with</span>
                  
                  <div class="social-login text-center">
                    <a href="#" class="facebook">
                      <span class="icon-facebook mr-3"></span> 
                    </a>
                    <a href="#" class="twitter">
                      <span class="icon-twitter mr-3"></span> 
                    </a>
                    <a href="#" class="google">
                      <span class="icon-google mr-3"></span> 
                    </a>
                  </div>
                </form>
              </div>
            </div>
          </div>
          
        </div>
        
      </div>
    </div>
  </div>

  
    <script src="{%static 'js/jquery-3.3.1.min.js'%}"></script>
    <script src="{%static 'js/popper.min.js'%}"></script>
    <script src="{%static 'js/bootstrap.min.js'%}"></script>
    <script src="{%static 'js/main.js'%}"></script>
  </body>
</html>
