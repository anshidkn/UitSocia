{% extends 'base.html' %}

{% load static %}

{% block body %}
  <div class="container mt-5 ">
    <div class="row">
      {% for post in post_list %}
        <div class="col-md-6 mb-3">
          <div class="card">
            <div class="card-body p-3">
              <div class="d-flex">
                <img class="rounded-circle mr-3" src="{{user.profile_picture.url}}" width="50" height="50" alt="Avatar">
                <div class="flex-fill">
                  <h5 class="card-title mb-1">{{ post.user }}</h5>
                  <p class="card-text mb-1 small text-muted">{{ post.publish_date }}</p>
                </div>
              </div>
              <p class="card-text mt-3">{{ post.description }}</p>
              <img class="card-img-bottom mb-3" src="{{ post.post_image.url }}" alt="Card image cap">
              <div class="d-flex align-items-center">
                <p class="card-text mr-3">
                  <small class="text-muted">Likes: {{ post.post_like }}</small>
                </p>
                <a href="#" class="btn btn-primary btn-sm">Like</a>
              </div>
            </div>
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
{% endblock %}
