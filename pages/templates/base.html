<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto|Varela+Round">

<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

<link rel="stylesheet" href="{%static 'css/navstyle.css' %}">
<style>
  .gradient-custom {
    /* fallback for old browsers */
    background: #89f7fe;
  
    /* Chrome 10-25, Safari 5.1-6 */
    background: -webkit-linear-gradient(to right, rgba(137,247,254,0.5), rgba(102,166,255,0.5));
  
    /* W3C, IE 10+/ Edge, Firefox 16+, Chrome 26+, Opera 12+, Safari 7+ */
    background: linear-gradient(to right, rgba(137,247,254,0.5), rgba(102,166,255,0.5))
  }
</style>
</head> 
<body>
<!-- Nav Section Start -->
<nav class="navbar navbar-expand-xl navbar-dark bg-danger">
	<a href="#" class="navbar-brand"><!--<i class="fa fa-cube"></i>-->Uit<b>Socia</b></a>  		
	<button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
		<span class="navbar-toggler-icon"></span>
	</button>
	<!-- Collection of nav links, forms, and other content for toggling -->
	<div id="navbarCollapse" class="collapse navbar-collapse justify-content-start">		
		<form class="navbar-form form-inline">
			<div class="input-group search-box">								
				<input type="text" id="search" class="form-control" placeholder="Search here...">
				<span class="input-group-addon"><i class="material-icons">&#xE8B6;</i></span>
			</div>
		</form>
		<div class="navbar-nav ml-auto">
			<a href="{%url 'home'%}" class="nav-item nav-link active"><i class="fa fa-home"></i><span>Home</span></a>
			<!-- <a href="#" class="nav-item nav-link"><i class="fa fa-gears"></i><span>Projects</span></a> -->
			<a href="{%url 'post-add'%}" class="nav-item nav-link"><i class="fa fa-users"></i><span>AddPost</span></a>
			<!-- <a href="#" class="nav-item nav-link"><i class="fa fa-pie-chart"></i><span>Reports</span></a> -->
			<!-- <a href="#" class="nav-item nav-link"><i class="fa fa-briefcase"></i><span>Careers</span></a> -->
			<a href="#" class="nav-item nav-link"><i class="fa fa-envelope"></i><span>Messages</span></a>		
			<a href="#" class="nav-item nav-link"><i class="fa fa-bell"></i><span>Notifications</span></a>
			<div class="nav-item dropdown">
				<a href="#" data-toggle="dropdown" class="nav-item nav-link dropdown-toggle user-action"><img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-chat/ava3-bg.webp" class="avatar" alt="Avatar">{{user.username}}<b class="caret"></b></a>
				<div class="dropdown-menu">
          {% if user.userprofilemodel%}
            <a href="{%url 'profile-list'%}" class="dropdown-item"><i class="fa fa-user-o"></i>View Profile</a>
          {% else %}
            <a href="{%url 'profile-create'%}" class="dropdown-item"><i class="fa fa-user-o"></i>Add Profile</a>
          {% endif %} 
					<a href="#" class="dropdown-item"><i class="fa fa-calendar-o"></i> Calendar</a>
					<a href="#" class="dropdown-item"><i class="fa fa-sliders"></i> Settings</a>
					<div class="divider dropdown-divider"></div>
					<a href="{%url 'logout'%}" class="dropdown-item"><i class="material-icons">&#xE8AC;</i> Logout</a>
				</div>
			</div>
		</div>
	</div>
</nav>
</body>
</html>
<!-- Nav Section Ends -->
